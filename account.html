<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Account</title>
    <link rel="stylesheet" href="account.css">
    <link rel="icon" type="icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTgbqhi19Fvyh13CS9WnNZJC-mQ8pLKqmGRCkNbFdG2oA&s">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html" target="_blank">Home</a></li>
            </ul>
        </nav>
    </header>
    <section>
        <form>
            <fieldset>
                <legend><h3>about me</h3></legend>
                <div>
                    <label>Name:</label>
                    <input type="text" placeholder="James">
                </div>
                <div>
                    <label>Surname:</label>
                    <input type="text" placeholder="parker">
                </div>
                <div>
                    <label>date of birth:</label>
                    <input type="date" placeholder="jj/mm/aaaa">
                </div>
                <div>
                    <label>phone-number:</label>
                    <input type="number" max="7">
                </div>
                <div>
                    <label>email</label>
                    <input type="email" placeholder="exemple@gmail.com">
                </div>
                <div>
                    <label>password:</label>
                    <input type="password" placeholder="*********">
                </div>
                <div>
                    <input type="submit" value="submit">
                    <input type="reset" value="reset">
                </div>
            </fieldset>
        </form>
    </section>
</body>
</html>
